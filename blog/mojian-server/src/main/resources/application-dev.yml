dromara:
  x-file-storage:
    default-platform: fastdfs #默认使用的存储平台
    thumbnail-suffix: ".min.jpg" #缩略图后缀，例如【.min.jpg】【.png】
    local-plus:
      - platform: local-plus-1 # 存储平台标识
        enable-storage: true  #启用存储
        enable-access: true #启用访问（线上请使用 Nginx 配置，效率更高）
        domain: http://127.0.0.1:8088/ # 访问域名，例如：“http://127.0.0.1:8030/file/”，注意后面要和 path-patterns 保持一致，“/”结尾，本地存储建议使用相对路径，方便后期更换域名
        base-path: local-plus/ # 基础路径
        path-patterns: /** # 访问路径
        storage-path: F:/shiyi-blog-master/ # 存储路径
    fastdfs:
      - platform: fastdfs # 存储平台标识
        enable-storage: true  # 启用存储
        run-mod: COVER #运行模式，默认 COVER（覆盖模式），强制用 FastDFS 返回的路径及文件名覆盖 FileInfo 中的 path 及 filename。
        tracker-server: # Tracker Server 配置
          server-addr: 182.92.85.80:22122 # Tracker Server 地址（IP:PORT），多个用英文逗号隔开
        domain: http://182.92.85.80/ # 访问域名，注意“/”结尾，例如：https://file.abc.com/
        base-path: "" # 基础路径，强烈建议留空，详情查看兼容性说明章节

retrofit:
  log:
    enable: true
  # 让 Retrofit 使用 Spring 容器中的 ObjectMapper
  global-object-mapper: true